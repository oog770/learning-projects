<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .accordion {
      list-style: none; 
      padding: 0;
      margin: 0;
    }

    .accordion li { /* 각 항목마다 구분선을 추가합니다. */
      border-bottom: 1px solid #ccc;
    }

    .accordion input[type="radio"] { /* 라디오 버튼을 숨깁니다. */
      display: none;
    }

    .accordion label { /* 라벨을 클릭 가능한 버튼처럼 스타일링합니다. */
      display: block;
      padding: 15px;
      cursor: pointer;
      background-color: #f9f9f9;
    }

    .accordion .content { /* 콘텐츠 영역을 숨깁니다. */
      display: none;
      padding: 15px;
      background-color: #fff;
    }

    .accordion input[type="radio"]:checked + label + .content /* 라디오 버튼이 선택된 경우 콘텐츠를 표시합니다. */ {
      display: block;
    }
  </style>
</head>
<body>
  <section id="faq">
  <ul class="accordion">
        <li>
          <input type="radio" name="accordion" id="first" />
          <label for="first">주문은 어떻게 하나요?</label>
          <div class="content">
            <p>
              스위커 온라인몰에서 주문하셔도 되고, 000-0000-0000으로 전화해서
              궁금한 것들을 확인한 후 주문하셔도 됩니다.
            </p>
          </div>
        </li>
        </section>
  
</body>
</html>
